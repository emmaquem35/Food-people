<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasseries à la Mode — Coûts</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#F7F0EE;--surface:#FFFCFB;--surface2:#F2EAE8;--surface3:#E8DCDA;
  --border:rgba(160,100,90,0.1);--border2:rgba(160,100,90,0.18);
  --text:#2A1A18;--text2:#7A5A55;--text3:#B09590;
  --green:#2E7D52;--green-bg:#E8F5EE;--green-t:#1C5235;
  --red:#B83030;--red-bg:#FAEBEB;--red-t:#7A1E1E;
  --blue:#3060A8;--blue-bg:#EAF0FB;--blue-t:#1C3E75;
  --amber:#9A6A10;--amber-bg:#FBF2DC;--amber-t:#6A480A;
  --topbar:#2A1A18;--accent:#C4956A;--accent2:#E8C4B8;--warm:#6B3A30;
  --r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
/* TOPBAR */
.topbar{background:var(--topbar);border-bottom:1px solid rgba(196,149,106,0.2);padding:0 2rem;display:flex;align-items:center;height:58px;position:sticky;top:0;z-index:100;}
.logo-zone{display:flex;align-items:center;gap:14px;padding-right:22px;border-right:1px solid rgba(196,149,106,0.2);}
.logo-main{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;line-height:1.2;}
.logo-sub{font-size:9px;color:var(--accent);letter-spacing:0.16em;text-transform:uppercase;}
.nav-tabs{display:flex;gap:2px;margin-left:22px;}
.nav-tab{padding:7px 22px;border-radius:5px;border:none;background:transparent;font-size:13px;color:rgba(255,255,255,0.5);cursor:pointer;font-weight:500;font-family:'Jost',sans-serif;display:flex;align-items:center;gap:7px;transition:all .15s;}
.nav-tab:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.07);}
.nav-tab.active{color:#fff;background:rgba(196,149,106,0.2);border-bottom:2px solid var(--accent);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.topbar-deco{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:rgba(196,149,106,0.45);}
.period-badge{background:rgba(196,149,106,0.15);border:1px solid rgba(196,149,106,0.3);border-radius:20px;padding:3px 12px;font-size:11px;color:var(--accent);font-weight:600;}
/* LAYOUT */
.page{display:none;padding:1.6rem 2rem;max-width:1440px;margin:0 auto;}
.page.active{display:block;}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1.4rem;flex-wrap:wrap;}
.rtab{padding:7px 18px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text2);cursor:pointer;font-weight:500;font-family:'Jost',sans-serif;transition:all .15s;}
.rtab:hover{border-color:var(--warm);color:var(--text);}
.rtab.active{background:var(--warm);color:#fff;border-color:var(--warm);}
.mpill{padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-size:12px;color:var(--text2);cursor:pointer;font-family:'Jost',sans-serif;transition:all .12s;}
.mpill:hover{border-color:var(--accent);}
.mpill.active{background:rgba(196,149,106,0.15);color:var(--warm);border-color:var(--accent);font-weight:600;}
.sep{flex:1;}
/* GRIDS */
.grid{display:grid;gap:14px;margin-bottom:14px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:1fr 1fr;}
/* KPI */
.kpi{background:var(--surface);border-radius:var(--r);padding:20px;border:1px solid var(--border);position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi.green::before{background:linear-gradient(90deg,var(--green),#4CAF7E);}
.kpi.red::before{background:linear-gradient(90deg,var(--red),#E85555);}
.kpi.amber::before{background:linear-gradient(90deg,var(--amber),#D4A030);}
.kpi.neutral::before{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.kpi.blue::before{background:linear-gradient(90deg,var(--blue),#5B8FD4);}
.kpi-icon{font-size:20px;margin-bottom:8px;}
.kpi-lbl{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.09em;font-weight:600;}
.kpi-val{font-size:30px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-0.025em;}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.6;}
.kdelta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:6px;}
.kdelta.up{background:var(--green-bg);color:var(--green-t);}
.kdelta.dn{background:var(--red-bg);color:var(--red-t);}
.kdelta.wa{background:var(--amber-bg);color:var(--amber-t);}
/* BANNER */
.banner{display:flex;align-items:center;gap:10px;border-radius:var(--r-sm);padding:12px 18px;margin-bottom:1.2rem;font-size:13px;line-height:1.5;}
.banner.ok{background:var(--green-bg);border:1px solid rgba(46,125,82,0.2);color:var(--green-t);}
.banner.warn{background:var(--red-bg);border:1px solid rgba(184,48,48,0.2);color:var(--red-t);}
.banner.neutral{background:var(--amber-bg);border:1px solid rgba(154,106,16,0.2);color:var(--amber-t);}
/* CARDS */
.cat-card{background:var(--surface);border-radius:var(--r);padding:20px;border:1px solid var(--border);}
.cat-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.cat-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;}
.cat-badge.ok{background:var(--green-bg);color:var(--green-t);}
.cat-badge.warn{background:var(--red-bg);color:var(--red-t);}
.cat-pct{font-size:38px;font-weight:700;letter-spacing:-0.03em;line-height:1;margin-bottom:8px;}
.cat-pct.ok{color:var(--green);}
.cat-pct.warn{color:var(--red);}
.pbar{height:6px;background:var(--surface3);border-radius:3px;margin:8px 0 6px;overflow:hidden;}
.pbar-fill{height:6px;border-radius:3px;}
.cat-footer{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}
.cmp-bar{display:flex;align-items:center;gap:8px;margin:3px 0;}
.cmp-track{flex:1;height:7px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.cmp-fill{height:7px;border-radius:3px;}
/* POLE */
.pole-card{background:var(--surface);border-radius:var(--r);padding:18px;border:1px solid var(--border);}
.pole-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.pole-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
/* CHART CARD */
.chart-card{background:var(--surface);border-radius:var(--r);padding:20px;border:1px solid var(--border);}
.chart-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px;}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;}
.legend span{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;}
.lsq{display:inline-block;width:10px;height:10px;border-radius:2px;flex-shrink:0;}
/* SECTION DIVIDER */
.section-div{display:flex;align-items:center;gap:14px;margin:24px 0 16px;}
.section-div-line{flex:1;height:1px;background:var(--border2);}
.section-div-lbl{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--text2);white-space:nowrap;}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{font-size:10px;color:var(--text3);font-weight:600;text-align:left;padding:9px 12px;border-bottom:2px solid var(--border2);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;}
.tbl th.r,.tbl td.r{text-align:right;}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tbody tr:hover td{background:var(--surface2);}
.tbl tfoot td{font-size:12px;font-style:italic;border-top:2px solid var(--border2);background:var(--surface2);padding:10px 12px;}
/* QUARTERLY */
.q-card{background:var(--surface);border-radius:var(--r);padding:22px;border:1px solid var(--border);position:relative;overflow:hidden;}
.q-card::after{content:'T1';position:absolute;top:-8px;right:16px;font-family:'Playfair Display',serif;font-size:72px;font-weight:700;color:rgba(196,149,106,0.07);line-height:1;}
.q-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:4px;}
.q-val{font-size:36px;font-weight:700;letter-spacing:-0.025em;line-height:1;}
.q-sub{font-size:12px;color:var(--text3);margin-top:6px;}
.q-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;margin-top:8px;}
.q-badge.ok{background:var(--green-bg);color:var(--green-t);}
.q-badge.warn{background:var(--red-bg);color:var(--red-t);}
.q-badge.neutral{background:var(--amber-bg);color:var(--amber-t);}
/* CHIPS */
.chip{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.chip.ok{background:var(--green-bg);color:var(--green-t);}
.chip.warn{background:var(--red-bg);color:var(--red-t);}
.chip.neutral{background:var(--surface2);color:var(--text2);}
.up{color:var(--green);font-weight:600;}
.dn{color:var(--red);font-weight:600;}
.wa{color:var(--amber);font-weight:600;}
/* COMMENTAIRES */
.comments-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.comments-ttl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;}
.btn-sm{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-size:11px;color:var(--text2);cursor:pointer;font-family:'Jost',sans-serif;}
.btn-sm:hover{border-color:var(--accent);}
.btn-add{padding:6px 16px;border-radius:20px;border:none;background:var(--warm);color:#fff;font-size:12px;cursor:pointer;font-family:'Jost',sans-serif;font-weight:600;}
.cbox{border-radius:var(--r);padding:16px 18px;margin-bottom:10px;}
.cbox.info{background:var(--blue-bg);border-left:4px solid var(--blue);}
.cbox.warning{background:var(--amber-bg);border-left:4px solid var(--amber);}
.cbox.success{background:var(--green-bg);border-left:4px solid var(--green);}
.cbox.action{background:var(--surface2);border-left:4px solid var(--warm);}
.cbox-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.cbox-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.cbox.info .cbox-type{color:var(--blue-t);}
.cbox.warning .cbox-type{color:var(--amber-t);}
.cbox.success .cbox-type{color:var(--green-t);}
.cbox.action .cbox-type{color:var(--warm);}
.cbox-acts button{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 5px;color:var(--text3);}
.cbox-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.cbox-body{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;}
.cbox-empty{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--r);padding:22px;text-align:center;color:var(--text3);font-size:13px;}
/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(42,26,24,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.modal-bx{background:var(--surface);border-radius:12px;padding:28px;width:520px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-ttl{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text);}
.mlbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.mgrp{margin-bottom:14px;}
.minput,.mtarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:13px;font-family:'Jost',sans-serif;background:var(--surface);color:var(--text);outline:none;}
.mtarea{resize:vertical;}
.minput:focus,.mtarea:focus{border-color:var(--accent);}
.tbtns{display:flex;gap:6px;flex-wrap:wrap;}
.tbtn{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;font-family:'Jost',sans-serif;color:var(--text2);}
.tbtn.sel-info{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-t);}
.tbtn.sel-warning{border-color:var(--amber);background:var(--amber-bg);color:var(--amber-t);}
.tbtn.sel-success{border-color:var(--green);background:var(--green-bg);color:var(--green-t);}
.tbtn.sel-action{border-color:var(--warm);background:var(--surface2);color:var(--warm);}
.mfooter{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}
.btn-cancel{padding:9px 20px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text2);cursor:pointer;font-family:'Jost',sans-serif;}
.btn-save{padding:9px 22px;border-radius:20px;border:none;background:var(--warm);color:#fff;font-size:13px;cursor:pointer;font-family:'Jost',sans-serif;font-weight:600;}
.save-flash{display:none;position:fixed;bottom:24px;right:24px;background:#2E7D52;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.2);z-index:2000;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-zone">
    <svg width="34" height="34" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="4" fill="rgba(196,149,106,0.15)"/><text x="18" y="24" text-anchor="middle" font-family="Playfair Display,serif" font-size="15" font-weight="700" fill="#C4956A">B</text><rect x="6" y="30" width="24" height="1" fill="rgba(196,149,106,0.4)" rx="1"/></svg>
    <div><div class="logo-main">Brasseries à la Mode</div><div class="logo-sub">Dashboard Couts</div></div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-fc" onclick="showPage('fc')"><span class="dot" style="background:#378ADD"></span>Food Cost</button>
    <button class="nav-tab" id="tab-pc" onclick="showPage('pc')"><span class="dot" style="background:var(--warm)"></span>People Cost</button>
  </div>
  <div class="topbar-right">
    <span class="period-badge">Mars 2026 — T1 complet</span>
    <span class="topbar-deco">La brasserie simple comme on la reve</span>
  </div>
</div>

<!-- FOOD COST PAGE -->
<div class="page active" id="page-fc">
  <div class="toolbar">
    <button class="rtab active" id="fcr-conso" onclick="fcSetResto('conso')">Consolide</button>
    <button class="rtab" id="fcr-rosie" onclick="fcSetResto('rosie')">Brasserie Rosie</button>
    <button class="rtab" id="fcr-lou"   onclick="fcSetResto('lou')">Rosie Lou</button>
    <div class="sep"></div>
    <button class="mpill active" id="fcm-0" onclick="fcSetMonth(0)">Jan</button>
    <button class="mpill" id="fcm-1" onclick="fcSetMonth(1)">Fev</button>
    <button class="mpill" id="fcm-2" onclick="fcSetMonth(2)">Mars</button>
  </div>
  <div id="fc-content"></div>
  <div id="fc-quarterly"></div>
  <div id="fc-comments-zone" style="margin-top:16px"></div>
</div>

<!-- PEOPLE COST PAGE -->
<div class="page" id="page-pc">
  <div class="toolbar">
    <button class="rtab active" id="pcr-conso" onclick="pcSetResto('conso')">Consolide</button>
    <button class="rtab" id="pcr-rosie" onclick="pcSetResto('rosie')">Brasserie Rosie</button>
    <button class="rtab" id="pcr-lou"   onclick="pcSetResto('lou')">Rosie Lou</button>
    <div class="sep"></div>
    <button class="mpill active" id="pcm-0" onclick="pcSetMonth(0)">Jan</button>
    <button class="mpill" id="pcm-1" onclick="pcSetMonth(1)">Fev</button>
    <button class="mpill" id="pcm-2" onclick="pcSetMonth(2)">Mars</button>
  </div>
  <div id="pc-content"></div>
  <div id="pc-quarterly"></div>
  <div id="pc-comments-zone" style="margin-top:16px"></div>
</div>

<div class="save-flash" id="save-flash">&#10003; Commentaires sauvegardes dans le fichier</div>

<script>
// ===== DATA FC =====
var FC_DATA = {
  rosie:[
    {food:26.8,bar:19.4,vin:19.3,desserts:21.1,total:24.4},
    {food:25.9,bar:17.6,vin:22.6,desserts:14.6,total:23.2},
    {food:24.2,bar:14.3,vin:30.0,desserts:17.8,total:22.8}
  ],
  lou:[
    {food:24.7,bar:22.9,vin:14.5,desserts:21.7,total:23.1},
    {food:25.7,bar:18.8,vin:23.0,desserts:15.3,total:23.6},
    {food:24.4,bar:19.2,vin:24.8,desserts:18.6,total:23.2}
  ]
};
FC_DATA.conso = FC_DATA.rosie.map(function(r,i){
  var l=FC_DATA.lou[i];
  return {food:rnd1((r.food+l.food)/2),bar:rnd1((r.bar+l.bar)/2),vin:rnd1((r.vin+l.vin)/2),desserts:rnd1((r.desserts+l.desserts)/2),total:rnd1((r.total+l.total)/2)};
});
// Q1 calcules depuis les achats / CA reels
var FC_Q1 = {
  rosie: {food:25.6, bar:17.1, vin:24.0, desserts:17.8, total:23.5,
          ca:1122.2, achats_food:186.7, achats_bar:26.4, achats_vin:31.3},
  lou:   {food:24.9, bar:20.3, vin:20.5, desserts:18.6, total:23.2,
          ca:811.0,  achats_food:137.3, achats_bar:20.7, achats_vin:16.9}
};
FC_Q1.conso = {
  food:rnd1((FC_Q1.rosie.food+FC_Q1.lou.food)/2),
  bar:rnd1((FC_Q1.rosie.bar+FC_Q1.lou.bar)/2),
  vin:rnd1((FC_Q1.rosie.vin+FC_Q1.lou.vin)/2),
  desserts:rnd1((FC_Q1.rosie.desserts+FC_Q1.lou.desserts)/2),
  total:rnd1((FC_Q1.rosie.total+FC_Q1.lou.total)/2),
  ca:FC_Q1.rosie.ca+FC_Q1.lou.ca
};
var FC_BUD = {
  rosie:{food:26.0,bar:19.0,vin:24.1,desserts:21.3},
  lou:{food:25.1,bar:19.5,vin:24.1,desserts:21.3},
  conso:{food:25.6,bar:19.3,vin:24.1,desserts:21.3}
};
var FC_SEU = {food:25,bar:18,vin:22,desserts:22};
var FC_LBL = {food:'Food',bar:'Bar',vin:'Vin',desserts:'Desserts'};
var FC_CLR = {food:'#378ADD',bar:'#1D9E75',vin:'#D4537E',desserts:'#BA7517'};
var CATS   = ['food','bar','vin','desserts'];

// ===== DATA PC =====
var PC_DATA = {
  rosie:{
    reel:[156.55,166.54,149.20],budget:[155.59,154.26,154.06],
    pct_reel:[0.4095,0.4580,0.3915],pct_budget:[0.4018,0.4227,0.3763],
    ca_reel:[382.28,363.65,381.09],
    detail:{0:{salle:0.1498,cuisine:0.1484,bar:0.0388,patisserie:0.0327},1:{salle:0.1472,cuisine:0.1597,bar:0.0401,patisserie:0.0376},2:{salle:0.1314,cuisine:0.1356,bar:0.0393,patisserie:0.0342}}
  },
  lou:{
    reel:[109.47,108.31,112.07],budget:[111.08,112.02,111.57],
    pct_reel:[0.3952,0.4112,0.4125],pct_budget:[0.4010,0.4252,0.4191],
    ca_reel:[277.00,263.42,271.70],
    detail:{0:{salle:0.1451,cuisine:0.1387,bar:0.0411,patisserie:0.0324},1:{salle:0.1550,cuisine:0.1403,bar:0.0355,patisserie:0.0390},2:{salle:0.1451,cuisine:0.1065,bar:0.0433,patisserie:0.0341}}
  }
};
PC_DATA.conso={reel:[],budget:[],ca_reel:[],pct_reel:[],pct_budget:[],detail:{}};
[0,1,2].forEach(function(i){
  PC_DATA.conso.reel.push(rnd2(PC_DATA.rosie.reel[i]+PC_DATA.lou.reel[i]));
  PC_DATA.conso.budget.push(rnd2(PC_DATA.rosie.budget[i]+PC_DATA.lou.budget[i]));

// ===== UTILS =====
function rnd1(v){return Math.round(v*10)/10;}
function rnd2(v){return Math.round(v*100)/100;}
function rnd4(v){return Math.round(v*10000)/10000;}
function p1(v){return v.toFixed(1)+'%';}
function keu(v){return v.toFixed(0)+' k€';}
function mkChip(v){return '<span class="chip '+(v>0?'warn':'ok')+'">'+(v>0?'+':'')+v.toFixed(1)+' pts</span>';}
function mkDelta(v,unit){return '<span class="kdelta '+(v>0?'dn':'up')+'">'+(v>0?'&#9650; +':'&#9660; ')+Math.abs(v).toFixed(1)+(unit||' pts')+'</span>';}
function mkCmpFC(rv,lv,max){
  var rw=Math.min(rv/max*100,100).toFixed(0),lw=Math.min(lv/max*100,100).toFixed(0);

    '<div class="cmp-bar"><span style="font-size:11px;font-weight:600;color:#3060A8;width:44px;flex-shrink:0">Lou</span><div class="cmp-track"><div class="cmp-fill" style="width:'+lw+'%;background:#3060A8;opacity:0.75"></div></div><span style="font-size:11px;font-weight:600;color:#3060A8;min-width:38px;text-align:right">'+p1(lv)+'</span></div></div>';

// ===== COMMENTAIRES =====
var CTYP={info:{label:'Info',cls:'info'},warning:{label:'Vigilance',cls:'warning'},success:{label:'Positif',cls:'success'},action:{label:'Action',cls:'action'}};

// Source de verite : les commentaires sont dans la page HTML elle-meme
// Initialises depuis le bloc JSON embarque, puis synchros vers localStorage
var EMBEDDED_COMMENTS = /*COMMENTS_START*/{"fc":[],"pc":[]}/*COMMENTS_END*/;

function ldC(tab){
  // Priorite au localStorage si existe, sinon embedded
  try{
    var ls=localStorage.getItem('balm_c_'+tab);
    if(ls!==null) return JSON.parse(ls);
  }catch(e){}
  return (EMBEDDED_COMMENTS[tab]||[]).slice();
}
function svC(tab,data){
  EMBEDDED_COMMENTS[tab]=data;
  try{localStorage.setItem('balm_c_'+tab,JSON.stringify(data));}catch(e){}
}
function getAllComments(){
  return {fc:ldC('fc'),pc:ldC('pc')};
}

function renderComments(tab){
  var z=document.getElementById(tab+'-comments-zone');if(!z)return;
  var cs=ldC(tab);
  var h='<div class="comments-hd"><div class="comments-ttl">Commentaires &amp; Analyse</div>'+
    '<div style="display:flex;gap:6px">'+
    '<button class="btn-sm" onclick="saveToFile()">&#128190; Sauvegarder dans le fichier</button>'+
    '<button class="btn-sm" onclick="expC(\''+tab+'\')">&#128203; Copier texte</button>'+
    '<button class="btn-add" onclick="showModal(\''+tab+'\',null,null)">+ Ajouter</button>'+
    '</div></div>';
  if(!cs.length){h+='<div class="cbox-empty">Aucun commentaire — cliquez <b>+ Ajouter</b> pour annoter</div>';}
  else{
    cs.forEach(function(c,idx){
      var t=CTYP[c.type]||CTYP.info;
      h+='<div class="cbox '+t.cls+'">'+
        '<div class="cbox-meta">'+
          '<div style="display:flex;align-items:center;gap:8px"><span class="cbox-type">'+t.label+'</span>'+(c.author?'<span style="font-size:11px;color:var(--text3)">· '+c.author+'</span>':'')+(c.date?'<span style="font-size:10px;color:var(--text3)">'+c.date+'</span>':'')+'</div>'+
          '<div class="cbox-acts"><button onclick="editC(\''+tab+'\','+idx+')" title="Modifier">&#9998;</button><button onclick="delC(\''+tab+'\','+idx+')" title="Supprimer">&#128465;</button></div>'+
        '</div>'+(c.title?'<div class="cbox-title">'+c.title+'</div>':'')+
        '<div class="cbox-body">'+c.body+'</div></div>';
    });
  }
  z.innerHTML=h;
}

function saveToFile(){
  // Recupere tous les commentaires courants
  var all=getAllComments();
  var json=JSON.stringify(all);
  // Lit le fichier HTML courant et remplace le bloc JSON
  var html=document.documentElement.outerHTML;
  // Remplace entre les marqueurs
  var re=/\/\*COMMENTS_START\*\/.*?\/\*COMMENTS_END\*\//;
  if(!re.test(html)){
    alert('Impossible de localiser le bloc de sauvegarde dans le fichier.');
    return;
  }
  var newHtml=html.replace(re,'/*COMMENTS_START*/'+json+'/*COMMENTS_END*/');
  // Telecharge le fichier mis a jour
  var blob=new Blob([newHtml],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='dashboard_costs.html';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  // Flash de confirmation
  var fl=document.getElementById('save-flash');
  fl.style.display='block';
  setTimeout(function(){fl.style.display='none';},3000);
}

function delC(tab,idx){var cs=ldC(tab);cs.splice(idx,1);svC(tab,cs);renderComments(tab);}
function editC(tab,idx){var cs=ldC(tab);showModal(tab,idx,cs[idx]);}

function showModal(tab,editIdx,ex){
  var old=document.getElementById('c-modal');if(old)old.remove();
  var sel=(ex&&ex.type)||'info';
  var tbtns=Object.keys(CTYP).map(function(k){
    return '<button class="tbtn'+(sel===k?' sel-'+k:'')+'" data-t="'+k+'" onclick="selType(this)">'+CTYP[k].label+'</button>';
  }).join('');
  var ov=document.createElement('div');
  ov.className='modal-ov';ov.id='c-modal';
  var isEdit=editIdx!==null&&editIdx>=0;
  ov.innerHTML='<div class="modal-bx">'+
    '<div class="modal-ttl">'+(isEdit?'Modifier':'Nouveau commentaire')+'</div>'+
    '<div class="mgrp"><div class="mlbl">Type</div><div class="tbtns" id="tbtns">'+tbtns+'</div></div>'+
    '<div class="mgrp"><div class="mlbl">Titre (optionnel)</div><input class="minput" id="c-ttl" value="'+(ex&&ex.title?ex.title:'')+'" placeholder="Ex : Vin — derive sur Mars"></div>'+
    '<div class="mgrp"><div class="mlbl">Commentaire</div><textarea class="mtarea" id="c-bdy" rows="4" placeholder="Votre analyse…">'+(ex&&ex.body?ex.body:'')+'</textarea></div>'+
    '<div class="mgrp"><div class="mlbl">Auteur (optionnel)</div><input class="minput" id="c-aut" value="'+(ex&&ex.author?ex.author:'')+'" placeholder="Ex : Emma"></div>'+
    '<div class="mfooter">'+
    '<button class="btn-cancel" onclick="document.getElementById(\'c-modal\').remove()">Annuler</button>'+
    '<button class="btn-save" onclick="saveC(\''+tab+'\','+(isEdit?editIdx:-1)+')">Enregistrer</button>'+
    '</div></div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function selType(btn){
  document.querySelectorAll('#tbtns .tbtn').forEach(function(b){b.className='tbtn';});
  btn.className='tbtn sel-'+btn.dataset.t;
}
function saveC(tab,editIdx){
  var body=document.getElementById('c-bdy').value.trim();
  if(!body){alert('Le commentaire ne peut pas etre vide.');return;}
  var ab=document.querySelector('#tbtns .tbtn[class*="sel-"]');
  var type=ab?ab.dataset.t:'info';
  var title=document.getElementById('c-ttl').value.trim();
  var author=document.getElementById('c-aut').value.trim();
  var now=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
  var cs=ldC(tab);
  var entry={type:type,title:title,body:body,author:author,date:now};
  if(editIdx>=0)cs[editIdx]=entry;else cs.push(entry);
  svC(tab,cs);
  document.getElementById('c-modal').remove();
  renderComments(tab);
}
function expC(tab){
  var cs=ldC(tab);if(!cs.length){alert('Aucun commentaire.');return;}
  var txt='BALM — '+(tab==='fc'?'Food Cost':'People Cost')+'\n'+new Date().toLocaleDateString('fr-FR')+'\n---\n\n'+
    cs.map(function(c,i){var t=CTYP[c.type]||CTYP.info;return(i+1)+'. ['+t.label+']'+(c.title?' '+c.title:'')+'\n'+c.body+(c.author?'\n— '+c.author:'');}).join('\n\n');
  navigator.clipboard.writeText(txt).then(function(){alert('Commentaires copies !');});
}

// ===== INIT =====
// Charger les commentaires embedded vers localStorage au demarrage
(function(){
  var tabs=['fc','pc'];
  tabs.forEach(function(tab){
    var emb=EMBEDDED_COMMENTS[tab]||[];
    if(emb.length>0){
      try{
        var ls=localStorage.getItem('balm_c_'+tab);
        // Si localStorage est vide ou contient moins de commentaires, prendre l'embedded
        var lsArr=ls?JSON.parse(ls):[];
        if(emb.length>lsArr.length){
          localStorage.setItem('balm_c_'+tab,JSON.stringify(emb));
        }
      }catch(e){
        try{localStorage.setItem('balm_c_'+tab,JSON.stringify(emb));}catch(e2){}
      }
    }
  });
})();

renderFC();
renderPC();
</script>
